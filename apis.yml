aid: mississippi-river-commission
name: Mississippi River Commission
description: >-
  The Mississippi River Commission (MRC) is a federal agency established in 1879
  that operates under the United States Army Corps of Engineers Mississippi
  Valley Division. The seven-member commission oversees the Mississippi River
  and Tributaries Project, managing flood control from the river's mouth to
  Cape Girardeau, Missouri, and improving navigation from Baton Rouge to Cairo,
  Illinois. The MRC is responsible for federal stewardship of the Mississippi
  River, including flood control, navigation, environmental management, and
  related engineering and policy work executed through six district offices.
